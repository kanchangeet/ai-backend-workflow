name: boilerplate

services:

  # ── PHP-FPM (Laravel app) ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: laravel_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - backend
    depends_on: []   # add db/redis here if running them locally

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:8000:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount public assets so Nginx serves them directly (no PHP overhead)
      - ./public:/var/www/html/public:ro
    networks:
      - backend
    depends_on:
      - app

  # ── Queue Worker (SQS) ──────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: laravel_worker
    restart: unless-stopped
    env_file: .env
    # Override CMD — run the queue worker instead of PHP-FPM
    command: >
      php artisan queue:work sqs
      --queue=master-events,default
      --sleep=3
      --tries=3
      --max-time=3600
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - backend
    depends_on:
      - app

volumes:
  app_storage:

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
